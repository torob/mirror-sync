name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -buildid=" -o mirrorsync ./cmd/mirrorsync
