version: 1

storage:
  published: .e2e/repos
  staging: .e2e/staged

sync:
  prune: true
  download:
    retries: 2
    max_connections_per_source: 2
    max_in_flight_requests: 4

apt:
  repositories:
    - name: docker-ubuntu
      publish_path: docker-ubuntu
      keyring: /etc/apt/keyrings/docker.asc
      primary_source:
        url: https://download.docker.com/linux/ubuntu
      architectures:
        - amd64
      suites:
        - name: noble
          components:
            - stable
    - name: ubuntu
      publish_path: ubuntu
      keyring: /usr/share/keyrings/ubuntu-archive-keyring.gpg
      primary_source:
        url: https://archive.ubuntu.com/ubuntu
      mirror_sources:
        - url: https://mirror.hetzner.com/ubuntu/packages
        - url: https://archive.ubuntu.com/ubuntu
      architectures:
        - amd64
      suites:
        - name: noble
          components:
            - restricted

apk:
  repositories:
    - name: alpine
      publish_path: alpine
      keys_dir: .e2e/alpine-keys
      primary_source:
        url: https://dl-cdn.alpinelinux.org/alpine
      mirror_sources:
        - url: https://dl-cdn.alpinelinux.org/alpine
      architectures:
        - x86_64
      versions:
        - name: v3.22
          repositories:
            - main
